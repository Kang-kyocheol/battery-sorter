<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Green Battery</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR", Arial, sans-serif;
  background: linear-gradient(180deg, #ffffff 0%, #f0faef 100%);
  color: #111827;
}

.app {
  max-width: 480px;
  min-height: 100vh;
  margin: 0 auto;
  padding: 28px 22px 36px;
  position: relative;
  overflow: hidden;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 800;
  font-size: 22px;
}

.logo-icon {
  width: 34px;
  height: 34px;
  border: 3px solid #159947;
  border-radius: 9px;
  display: grid;
  place-items: center;
  color: #159947;
}

.menu {
  font-size: 34px;
  line-height: 1;
}

.hero {
  margin-top: 70px;
  position: relative;
}

.sub-title {
  font-size: 28px;
  font-weight: 500;
  margin-bottom: 8px;
}

.title {
  font-size: 54px;
  line-height: 1.15;
  font-weight: 900;
  letter-spacing: -2px;
}

.title .green {
  color: #14964a;
}

.desc {
  margin-top: 24px;
  font-size: 20px;
  line-height: 1.6;
  color: #6b7280;
}

.mascot {
  position: absolute;
  right: -8px;
  bottom: -20px;
  width: 150px;
  height: 150px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 25%, #b9eb63, #61bd26);
  box-shadow: 0 16px 28px rgba(42, 126, 45, 0.25);
}

.mascot::before {
  content: "🔋";
  position: absolute;
  left: -18px;
  bottom: 28px;
  font-size: 48px;
  transform: rotate(-8deg);
}

.mascot::after {
  content: "😉";
  position: absolute;
  left: 35px;
  top: 38px;
  font-size: 48px;
}

.leaf {
  position: absolute;
  width: 28px;
  height: 44px;
  background: #82d742;
  border-radius: 100% 0 100% 0;
  top: -28px;
  left: 58px;
  transform: rotate(-35deg);
}

.leaf.two {
  left: 82px;
  transform: rotate(35deg);
}

.card {
  margin-top: 90px;
  background: rgba(255,255,255,0.95);
  border-radius: 32px;
  padding: 28px 18px;
  box-shadow: 0 16px 40px rgba(0,0,0,0.08);
}

.upload-box {
  border: 2px dashed #c8e6c9;
  border-radius: 28px;
  padding: 38px 18px;
  text-align: center;
}

.camera-icon {
  width: 76px;
  height: 76px;
  border-radius: 50%;
  background: #eaf6e8;
  display: grid;
  place-items: center;
  margin: 0 auto 24px;
  font-size: 34px;
}

.upload-title {
  font-size: 24px;
  font-weight: 800;
  margin-bottom: 8px;
}

.upload-desc {
  color: #6b7280;
  font-size: 16px;
  margin-bottom: 28px;
}

input[type="file"] {
  display: none;
}

.btn {
  width: 100%;
  height: 58px;
  border-radius: 999px;
  border: none;
  font-size: 20px;
  font-weight: 800;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

.btn-camera {
  background: linear-gradient(135deg, #149647, #047c34);
  color: white;
  box-shadow: 0 12px 24px rgba(20,150,71,0.28);
}

.btn-upload {
  margin-top: 14px;
  background: white;
  color: #147c3c;
  border: 2px solid #d5ead7;
}

.preview {
  display: none;
  width: 100%;
  margin-top: 22px;
  border-radius: 20px;
}

.result {
  margin-top: 20px;
  padding: 18px;
  border-radius: 20px;
  background: #f0faf1;
  color: #146c36;
  font-weight: 800;
  display: none;
}

.categories {
  margin-top: 28px;
}

.categories h3 {
  font-size: 20px;
  margin-bottom: 14px;
}

.category-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.category {
  background: white;
  border-radius: 18px;
  padding: 14px 8px;
  text-align: center;
  box-shadow: 0 8px 24px rgba(0,0,0,0.06);
  font-size: 13px;
  font-weight: 700;
}

.category .emoji {
  font-size: 30px;
  margin-bottom: 8px;
}

.footer-banner {
  margin-top: 28px;
  background: linear-gradient(135deg, #0b7d35, #159947);
  color: white;
  border-radius: 24px;
  padding: 22px;
  display: flex;
  gap: 16px;
  align-items: center;
}

.footer-banner .earth {
  font-size: 40px;
}

.footer-banner strong {
  font-size: 21px;
}

.footer-banner p {
  margin: 5px 0 0;
  opacity: 0.9;
}

@media (max-width: 390px) {
  .title {
    font-size: 46px;
  }

  .mascot {
    width: 125px;
    height: 125px;
  }

  .category-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

<body>
<div class="app">

  <div class="header">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <span>Green Battery</span>
    </div>
    <div class="menu">☰</div>
  </div>

  <section class="hero">
    <div class="sub-title">사진으로 간편하게</div>
    <div class="title">
      <span class="green">건전지</span>를<br>
      분류해봐요!
    </div>
    <div class="desc">
      정확한 분류로 안전을 지키고,<br>
      지구를 보호해요.
    </div>

    <div class="mascot">
      <div class="leaf"></div>
      <div class="leaf two"></div>
    </div>
  </section>

  <section class="card">
    <div class="upload-box">
      <div class="camera-icon">📷</div>

      <div class="upload-title">사진을 촬영하거나 업로드하세요</div>
      <div class="upload-desc">건전지 또는 배터리가 보이게 촬영해주세요.</div>

      <label class="btn btn-camera">
        📷 카메라로 촬영
        <input type="file" accept="image/*" capture="environment" id="cameraInput">
      </label>

      <label class="btn btn-upload">
        🖼️ 사진 업로드
        <input type="file" accept="image/*" id="uploadInput">
      </label>

      <img id="preview" class="preview" />

      <div id="result" class="result">
        🔍 사진이 선택되었습니다. AI 분석 기능은 다음 단계에서 연결됩니다.
      </div>
    </div>
  </section>

  <section class="categories">
    <h3>이런 것들도 분류할 수 있어요</h3>

    <div class="category-grid">
      <div class="category">
        <div class="emoji">🔋</div>
        1차 건전지
      </div>
      <div class="category">
        <div class="emoji">🪙</div>
        코인 전지
      </div>
      <div class="category">
        <div class="emoji">⚡</div>
        보조배터리
      </div>
      <div class="category">
        <div class="emoji">🚗</div>
        내장형 배터리
      </div>
    </div>
  </section>

  <section class="footer-banner">
    <div class="earth">🌎</div>
    <div>
      <strong>작은 실천이 지구를 지켜요!</strong>
      <p>올바른 분리배출로 더 안전한 내일을 만들어요 💚</p>
    </div>
  </section>

</div>

<script>
const cameraInput = document.getElementById("cameraInput");
const uploadInput = document.getElementById("uploadInput");
const preview = document.getElementById("preview");
const result = document.getElementById("result");

function handleImage(file) {
  if (!file) return;

  preview.src = URL.createObjectURL(file);
  preview.style.display = "block";
  result.style.display = "block";
}

cameraInput.addEventListener("change", function () {
  handleImage(this.files[0]);
});

uploadInput.addEventListener("change", function () {
  handleImage(this.files[0]);
});
</script>

</body>
</html>
