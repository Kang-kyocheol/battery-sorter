<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Green Battery</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Noto Sans KR", Arial, sans-serif;
  color: #111827;
  background:
    url("ui/leaf-bg.png") bottom center no-repeat,
    linear-gradient(180deg, #ffffff 0%, #f0faef 100%);
  background-size: 100% auto, cover;
  background-attachment: scroll;
}

.app {
  max-width: 480px;
  min-height: 100vh;
  margin: 0 auto;
  padding: 28px 22px 36px;
  position: relative;
  overflow: hidden;
}

/* 상단 로고 */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  z-index: 5;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 800;
  font-size: 22px;
}

.logo-icon {
  width: 36px;
  height: 36px;
  border: 3px solid #159947;
  border-radius: 10px;
  display: grid;
  place-items: center;
  color: #159947;
  font-size: 18px;
  background: rgba(255,255,255,0.75);
}

.menu {
  font-size: 34px;
  line-height: 1;
  font-weight: 700;
}

/* 메인 문구 */
.hero {
  margin-top: 70px;
  position: relative;
  min-height: 270px;
  z-index: 2;
}

.sub-title {
  font-size: 28px;
  font-weight: 500;
  margin-bottom: 8px;
  letter-spacing: -1px;
}

.title {
  font-size: 54px;
  line-height: 1.15;
  font-weight: 900;
  letter-spacing: -2.5px;
}

.title .green {
  color: #14964a;
}

.desc {
  margin-top: 24px;
  font-size: 20px;
  line-height: 1.6;
  color: #6b7280;
  letter-spacing: -0.5px;
}

/* 캐릭터 이미지 */
.mascot-img {
  position: absolute;
  right: -38px;
  bottom: -32px;
  width: 250px;
  max-width: 54vw;
  z-index: 1;
  pointer-events: none;
  filter: drop-shadow(0 18px 24px rgba(35, 112, 39, 0.22));
}

/* 반짝이 장식 */
.sparkle {
  position: absolute;
  right: 18px;
  top: 98px;
  font-size: 32px;
  color: #cce85c;
  z-index: 0;
}

/* 업로드 카드 */
.card {
  margin-top: 42px;
  background: rgba(255,255,255,0.94);
  border-radius: 32px;
  padding: 28px 18px;
  box-shadow: 0 16px 40px rgba(0,0,0,0.08);
  position: relative;
  z-index: 4;
  backdrop-filter: blur(6px);
}

.upload-box {
  border: 2px dashed #c8e6c9;
  border-radius: 28px;
  padding: 38px 18px;
  text-align: center;
}

.camera-icon {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  background: #eaf6e8;
  display: grid;
  place-items: center;
  margin: 0 auto 24px;
  overflow: hidden;
}

.camera-icon img {
  width: 78px;
  height: 78px;
  object-fit: contain;
}

.upload-title {
  font-size: 24px;
  font-weight: 800;
  margin-bottom: 8px;
  letter-spacing: -1px;
}

.upload-desc {
  color: #6b7280;
  font-size: 16px;
  margin-bottom: 28px;
  line-height: 1.5;
}

input[type="file"] {
  display: none;
}

.btn {
  width: 100%;
  height: 58px;
  border-radius: 999px;
  border: none;
  font-size: 20px;
  font-weight: 800;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  letter-spacing: -0.5px;
}

.btn-camera {
  background: linear-gradient(135deg, #149647, #047c34);
  color: white;
  box-shadow: 0 12px 24px rgba(20,150,71,0.28);
}

.btn-upload {
  margin-top: 14px;
  background: white;
  color: #147c3c;
  border: 2px solid #d5ead7;
}

.preview {
  display: none;
  width: 100%;
  margin-top: 22px;
  border-radius: 20px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}

.result {
  margin-top: 20px;
  padding: 18px;
  border-radius: 20px;
  background: #f0faf1;
  color: #146c36;
  font-weight: 800;
  line-height: 1.5;
  display: none;
}

/* 분류 가능 항목 */
.categories {
  margin-top: 28px;
  position: relative;
  z-index: 4;
}

.categories h3 {
  font-size: 20px;
  margin-bottom: 14px;
  letter-spacing: -0.7px;
}

.category-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.category {
  background: rgba(255,255,255,0.95);
  border-radius: 18px;
  padding: 14px 8px;
  text-align: center;
  box-shadow: 0 8px 24px rgba(0,0,0,0.06);
  font-size: 13px;
  font-weight: 700;
  line-height: 1.35;
}

.category .emoji {
  font-size: 30px;
  margin-bottom: 8px;
}

/* 하단 배너 */
.footer-banner {
  margin-top: 28px;
  background: linear-gradient(135deg, #0b7d35, #159947);
  color: white;
  border-radius: 24px;
  padding: 22px;
  display: flex;
  gap: 16px;
  align-items: center;
  position: relative;
  z-index: 4;
  box-shadow: 0 12px 28px rgba(11,125,53,0.22);
}

.footer-banner .earth {
  font-size: 40px;
}

.footer-banner strong {
  font-size: 21px;
  letter-spacing: -0.8px;
}

.footer-banner p {
  margin: 5px 0 0;
  opacity: 0.9;
  line-height: 1.4;
}

/* 작은 모바일 대응 */
@media (max-width: 390px) {
  .app {
    padding: 24px 18px 32px;
  }

  .hero {
    margin-top: 56px;
    min-height: 245px;
  }

  .sub-title {
    font-size: 24px;
  }

  .title {
    font-size: 46px;
  }

  .desc {
    font-size: 18px;
  }

  .mascot-img {
    right: -44px;
    bottom: -24px;
    width: 218px;
    max-width: 56vw;
  }

  .card {
    margin-top: 32px;
  }

  .category-grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

<body>
<div class="app">

  <div class="header">
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <span>Green Battery</span>
    </div>
    <div class="menu">☰</div>
  </div>

  <section class="hero">
    <div class="sparkle">✦</div>

    <div class="sub-title">사진으로 간편하게</div>
    <div class="title">
      <span class="green">건전지</span>를<br>
      분류해봐요!
    </div>
    <div class="desc">
      정확한 분류로 안전을 지키고,<br>
      지구를 보호해요.
    </div>

    <img src="ui/mascot-battery.png" class="mascot-img" alt="건전지 분류 캐릭터">
  </section>

  <section class="card">
    <div class="upload-box">
      <div class="camera-icon">
        <img src="ui/camera-icon.png" alt="카메라 아이콘">
      </div>

      <div class="upload-title">사진을 촬영하거나 업로드하세요</div>
      <div class="upload-desc">건전지 또는 배터리가 보이게 촬영해주세요.</div>

      <label class="btn btn-camera">
        📷 카메라로 촬영
        <input type="file" accept="image/*" capture="environment" id="cameraInput">
      </label>

      <label class="btn btn-upload">
        🖼️ 사진 업로드
        <input type="file" accept="image/*" id="uploadInput">
      </label>

      <img id="preview" class="preview" alt="업로드한 사진 미리보기" />

      <div id="result" class="result">
        🔍 사진이 선택되었습니다.<br>
        AI 분석 기능은 다음 단계에서 연결됩니다.
      </div>
    </div>
  </section>

  <section class="categories">
    <h3>이런 것들도 분류할 수 있어요</h3>

    <div class="category-grid">
      <div class="category">
        <img src="ui/primary-battery.png" width="55" height="55">
       <br> 1차 건전지<br>
        알카라인 등
      </div>
      <div class="category">
        <img src="ui/coin-battery.png" width="55" height="55">
        코인 전지<br>
        리튬 등
      </div>
      <div class="category">
         <img src="ui/power-bank.png" width="55" height="55">
        보조배터리
      </div>
      <div class="category">
         <img src="ui/embedded-battery-product.png" width="55" height="55">
        내장형<br>
        배터리 제품
      </div>
    </div>
  </section>

  <section class="footer-banner">
    <div class="earth">🌎</div>
    <div>
      <strong>작은 실천이 지구를 지켜요!</strong>
      <p>올바른 분리배출로 더 안전한 내일을 만들어요 💚</p>
    </div>
  </section>

</div>

<script>
const cameraInput = document.getElementById("cameraInput");
const uploadInput = document.getElementById("uploadInput");
const preview = document.getElementById("preview");
const result = document.getElementById("result");

function handleImage(file) {
  if (!file) return;

  preview.src = URL.createObjectURL(file);
  preview.style.display = "block";
  result.style.display = "block";
}

cameraInput.addEventListener("change", function () {
  handleImage(this.files[0]);
});

uploadInput.addEventListener("change", function () {
  handleImage(this.files[0]);
});
</script>

</body>
</html>
